<!DOCTYPE html>
<html lang="ru">

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f7f7f7;
color:#222;
}

/* ВЕРХ САЙТА */
header{
background:white;
color:#111;
text-align:center;
padding:30px 20px;
border-bottom:1px solid #ddd;
}

/* ГАЛЕРЕЯ */
.gallery{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

/* УВЕЛИЧЕНИЕ ФОТО */
.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* НИЗ САЙТА */
footer{
margin-top:50px;
background:#f1f1f1;
color:#555;
text-align:center;
padding:20px;
font-size:14px;
}

</style>
</head>

<body>

<header>
<h1>Каталог мебельных стульев</h1>

</header>

<div class="lightbox" id="lightbox">
<img id="bigImg">
</div>

<script>

const images =
document.querySelectorAll(".card img");
const lightbox = document.getElementById("lightbox");
const bigImg = document.getElementById("bigImg");

// открытие
images.forEach(img=>{
  img.addEventListener("click", ()=>{
    lightbox.style.display = "flex";
    bigImg.src = img.src;
  });
});

// закрытие
lightbox.addEventListener("click", (e) => {
  if (e.target === lightbox) {
    lightbox.style.display = "none";
  }
});

</script>
